<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>גילוי מין</title>
  <style>
    :root {
      --bg: #f6f1d7;
      --panel: rgba(243, 237, 209, 0.9);
      --border: rgba(177, 170, 112, 0.45);
      --text: #5b5630;
      --muted: #8b8559;
      --pink: #e2c84d;
      --blue: #8fc34a;
      --radius: 22px;
      --radius-sm: 16px;
      --shadow: 0 18px 42px rgba(122, 116, 63, 0.16);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top left, rgba(226, 200, 77, 0.24), transparent 36%),
        radial-gradient(circle at top right, rgba(143, 195, 74, 0.24), transparent 36%),
        radial-gradient(circle at bottom center, rgba(233, 229, 182, 0.82), transparent 46%),
        linear-gradient(180deg, #f8f4df 0%, #f1ebca 52%, #e6efd5 100%);
      color: var(--text);
      font-family: "Trebuchet MS", "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    body { padding: 18px; }

    button, input, select { font: inherit; }

    .shell {
      max-width: 560px;
      margin: 0 auto;
      display: grid;
      gap: 18px;
    }

    .topbar,
    .card,
    .admin-panel {
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .topbar {
      padding: 20px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 18px;
      z-index: 20;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.5rem, 4vw, 2.2rem);
      letter-spacing: -0.04em;
    }

    .status-pill {
      padding: 9px 14px;
      border-radius: 999px;
      border: 1px solid var(--border);
      color: var(--muted);
      white-space: nowrap;
      background: rgba(244, 239, 212, 0.84);
      font-size: 0.82rem;
    }

    /* Gauge */
    .gauge-card {
      padding: 20px 22px;
      display: grid;
      gap: 14px;
    }

    .section-title {
      margin: 0;
      font-size: 0.82rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .gauge-track {
      width: 100%;
      height: 30px;
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: rgba(235, 231, 197, 0.88);
      display: flex;
    }

    .gauge-fill {
      height: 100%;
      transition: width 0.4s ease;
    }

    .gauge-fill.girl {
      background: linear-gradient(90deg, #d4b830, #f0d975);
    }

    .gauge-fill.boy {
      background: linear-gradient(90deg, #78b038, #aad870);
    }

    .gauge-legend {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .legend-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(240, 234, 202, 0.78);
      border: 1px solid var(--border);
      font-size: 0.95rem;
    }

    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      display: inline-block;
    }

    .legend-dot.girl { background: var(--pink); }
    .legend-dot.boy { background: var(--blue); }

    /* Vote card */
    .trade-card { padding: 28px 22px; }

    .trade-controls { display: grid; gap: 20px; }

    .action-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .action-btn {
      min-height: 150px;
      border: 2px solid var(--border);
      color: var(--text);
      border-radius: 24px;
      cursor: pointer;
      transition: transform 0.16s ease, box-shadow 0.16s ease, opacity 0.16s ease, filter 0.16s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 20px 16px;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-emoji {
      font-size: 3rem;
      line-height: 1;
    }

    .btn-label {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .action-btn.pink {
      border-color: rgba(226, 200, 77, 0.52);
      background: linear-gradient(160deg, rgba(243, 231, 154, 0.96), rgba(252, 246, 210, 0.99));
      box-shadow: 0 8px 24px rgba(226, 200, 77, 0.22);
    }

    .action-btn.blue {
      border-color: rgba(143, 195, 74, 0.52);
      background: linear-gradient(160deg, rgba(190, 232, 140, 0.96), rgba(220, 244, 192, 0.99));
      box-shadow: 0 8px 24px rgba(143, 195, 74, 0.22);
    }

    .action-btn:hover:not(:disabled) {
      transform: translateY(-4px) scale(1.02);
    }

    .action-btn:active:not(:disabled) {
      transform: translateY(1px) scale(0.98);
    }

    .action-btn.choice-highlight {
      border-width: 3px;
      transform: translateY(-4px) scale(1.03) !important;
    }

    .action-btn.pink.choice-highlight {
      border-color: #c8a820;
      box-shadow: 0 0 0 6px rgba(226, 200, 77, 0.26), 0 14px 36px rgba(226, 200, 77, 0.32);
    }

    .action-btn.blue.choice-highlight {
      border-color: #5a9c18;
      box-shadow: 0 0 0 6px rgba(143, 195, 74, 0.3), 0 14px 36px rgba(143, 195, 74, 0.32);
    }

    .choice-dim {
      opacity: 0.38 !important;
      transform: scale(0.96) !important;
      filter: saturate(0.5);
    }

    .action-btn:disabled {
      cursor: not-allowed;
    }

    .simple-note {
      border: 1px dashed var(--border);
      border-radius: var(--radius-sm);
      background: rgba(236, 231, 196, 0.8);
      padding: 14px 18px;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.45;
      text-align: center;
    }

    /* Admin */
    .admin-panel {
      padding: 18px 22px;
      display: grid;
      gap: 12px;
    }

    .terminal-line {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .admin-gate, .admin-actions {
      display: grid;
      gap: 10px;
    }

    .admin-actions {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .admin-btn {
      border: 1px solid var(--border);
      color: var(--text);
      background: rgba(240, 234, 201, 0.84);
      border-radius: 14px;
      cursor: pointer;
      padding: 13px 16px;
      font-weight: 700;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .admin-btn:hover:not(:disabled) { transform: translateY(-1px); }

    .admin-btn:disabled {
      opacity: 0.42;
      cursor: not-allowed;
      transform: none;
    }

    .hidden { display: none !important; }

    .footer-note {
      color: var(--muted);
      font-size: 0.85rem;
      text-align: center;
      padding-bottom: 8px;
    }

    /* ── Full-screen reveal ── */
    .result-banner {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9000;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      overflow: hidden;
    }

    .result-banner.visible {
      display: flex;
      animation: reveal-in 0.55s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .result-banner.winner-pink {
      background: radial-gradient(circle at 40% 40%, #f8e060 0%, #e8a820 45%, #c07800 100%);
    }

    .result-banner.winner-blue {
      background: radial-gradient(circle at 40% 40%, #9ae050 0%, #58b020 45%, #2a7800 100%);
    }

    @keyframes reveal-in {
      0%  { opacity: 0; transform: scale(1.1); }
      100%{ opacity: 1; transform: scale(1); }
    }

    .result-content {
      position: relative;
      z-index: 9100;
      text-align: center;
      display: grid;
      gap: 14px;
      justify-items: center;
      animation: pop-in 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) 0.25s both;
      padding: 24px;
    }

    @keyframes pop-in {
      0%  { opacity: 0; transform: scale(0.5) translateY(30px); }
      100%{ opacity: 1; transform: scale(1) translateY(0); }
    }

    .result-emoji-big {
      font-size: clamp(5rem, 20vw, 10rem);
      line-height: 1;
      animation: float 2.4s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(-3deg); }
      50%       { transform: translateY(-18px) rotate(3deg); }
    }

    .result-banner h2 {
      margin: 0;
      font-size: clamp(3.8rem, 14vw, 9rem);
      font-weight: 900;
      letter-spacing: -0.04em;
      color: #fff;
      text-shadow: 0 4px 24px rgba(0,0,0,0.28), 0 0 80px rgba(255,255,255,0.5);
      line-height: 1;
      animation: pulse-text 1.8s ease-in-out infinite;
    }

    @keyframes pulse-text {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.05); }
    }

    .result-sub {
      margin: 0;
      font-size: clamp(1.2rem, 4vw, 2rem);
      color: rgba(255,255,255,0.9);
      font-weight: 700;
      text-shadow: 0 2px 10px rgba(0,0,0,0.2);
    }

    .result-tap-hint {
      margin: 0;
      font-size: 0.95rem;
      color: rgba(255,255,255,0.55);
      margin-top: 8px;
    }

    /* Confetti particles (created via JS) */
    @keyframes confetti-fall {
      0%   { transform: translateY(-10px) rotate(0deg);   opacity: 1; }
      100% { transform: translateY(110vh) rotate(600deg); opacity: 0; }
    }

    @keyframes confetti-sway {
      0%   { transform: translateY(-10px) translateX(0)    rotate(0deg);   opacity: 1; }
      40%  { transform: translateY(44vh)  translateX(28px) rotate(280deg); opacity: 1; }
      100% { transform: translateY(110vh) translateX(-18px)rotate(600deg); opacity: 0; }
    }

    /* Responsive */
    @media (max-width: 760px) {
      body { padding: 12px; }

      .topbar {
        position: static;
        padding: 16px 18px;
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
      }

      .action-btn   { min-height: 160px; }
      .btn-emoji    { font-size: 3.4rem; }
      .btn-label    { font-size: 2.4rem; }

      .admin-actions { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="shell">

    <section class="topbar">
      <h1>מה ניץ מבשלת?</h1>
      <div class="status-pill" id="connectionStatus">מתחבר...</div>
    </section>

    <!-- Full-screen reveal overlay -->
    <section class="result-banner" id="resultBanner">
      <div class="result-content">
        <div class="result-emoji-big" id="resultEmoji">🎀</div>
        <h2 id="resultTitle">זו בת!</h2>
        <p class="result-sub" id="resultSub"></p>
        <p class="result-tap-hint">לחצו להסרת המסך</p>
      </div>
    </section>

    <!-- Live gauge -->
    <section class="card gauge-card">
      <div class="section-title">ניחושים בזמן אמת</div>
      <div class="gauge-track" aria-label="Live odds gauge">
        <div class="gauge-fill girl" id="girlGauge" style="width: 50%;"></div>
        <div class="gauge-fill boy"  id="boyGauge"  style="width: 50%;"></div>
      </div>
      <div class="gauge-legend">
        <div class="legend-pill"><span class="legend-dot girl"></span>בת&nbsp;<strong id="girlGaugeLabel">50%</strong></div>
        <div class="legend-pill"><span class="legend-dot boy"></span>בן&nbsp;<strong id="boyGaugeLabel">50%</strong></div>
      </div>
    </section>

    <!-- Vote card -->
    <section class="card trade-card">
      <div class="trade-controls">
        <div class="section-title" style="text-align:center;">מה הניחוש שלכם?</div>
        <div class="action-grid">
          <button class="action-btn pink" id="betPinkBtn">
            <div class="btn-emoji">👧</div>
            <div class="btn-label">בת</div>
          </button>
          <button class="action-btn blue" id="betBlueBtn">
            <div class="btn-emoji">👦</div>
            <div class="btn-label">בן</div>
          </button>
        </div>
        <div class="simple-note" id="tradeHint">לחצו פעם אחת כדי לנעול את הבחירה.</div>
      </div>
    </section>

    <!-- Admin panel -->
    <section class="admin-panel">
      <div class="terminal-line">
        <strong>פאנל ניהול</strong>
        <span>למנהל בלבד</span>
      </div>
      <div class="admin-gate" id="adminGate">
        <button class="admin-btn" id="adminUnlockBtn">פתח ניהול</button>
      </div>
      <div id="adminControls" class="hidden">
        <div class="admin-actions">
          <button class="admin-btn" id="revealPinkBtn">חשוף בת 👧</button>
          <button class="admin-btn" id="revealBlueBtn">חשוף בן 👦</button>
          <button class="admin-btn" id="resetMarketBtn">אפס</button>
          <button class="admin-btn" id="resetWalletBtn">אפס את הבחירה שלי</button>
        </div>
      </div>
    </section>

    <div class="footer-note">גילוי מין 2026 ✨</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL    = "https://pyaqlhumyhvsutamhwmb.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_DIejNqBd3o6wIjuxDGWp2A_an9icl7t";
    const ADMIN_PASSCODE  = "babylove2026";
    const MARKET_ID       = 1;
    const STORAGE_KEY     = "gender-reveal-market-vote-v3";
    const DEFAULT_WALLET  = { vote: null, locked: false, history: [] };
    const SIDE_LABELS     = { pink: "בת", blue: "בן" };

    const els = {
      connectionStatus: document.getElementById("connectionStatus"),
      girlGauge:        document.getElementById("girlGauge"),
      boyGauge:         document.getElementById("boyGauge"),
      girlGaugeLabel:   document.getElementById("girlGaugeLabel"),
      boyGaugeLabel:    document.getElementById("boyGaugeLabel"),
      tradeHint:        document.getElementById("tradeHint"),
      betPinkBtn:       document.getElementById("betPinkBtn"),
      betBlueBtn:       document.getElementById("betBlueBtn"),
      adminGate:        document.getElementById("adminGate"),
      adminControls:    document.getElementById("adminControls"),
      adminUnlockBtn:   document.getElementById("adminUnlockBtn"),
      revealPinkBtn:    document.getElementById("revealPinkBtn"),
      revealBlueBtn:    document.getElementById("revealBlueBtn"),
      resetMarketBtn:   document.getElementById("resetMarketBtn"),
      resetWalletBtn:   document.getElementById("resetWalletBtn"),
      resultBanner:     document.getElementById("resultBanner"),
      resultTitle:      document.getElementById("resultTitle"),
      resultEmoji:      document.getElementById("resultEmoji"),
      resultSub:        document.getElementById("resultSub"),
    };

    const state = {
      wallet:           loadWallet(),
      market:           null,
      channel:          null,
      supabase:         null,
      isBusy:           false,
      isAdmin:          false,
      revealTimer:      null,
      confettiNode:     null,
    };

    /* ── Wallet helpers ── */

    function loadWallet() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? { ...DEFAULT_WALLET, ...JSON.parse(raw) } : { ...DEFAULT_WALLET };
      } catch { return { ...DEFAULT_WALLET }; }
    }

    function saveWallet() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.wallet));
    }

    function resetLocalWallet() {
      state.wallet = { ...DEFAULT_WALLET, history: [] };
      saveWallet();
      renderWallet();
      renderReveal();
    }

    function sideLabel(side) { return SIDE_LABELS[side] || side; }

    function getPrices(market) {
      const p = Number(market.pink_pool), b = Number(market.blue_pool), t = p + b;
      return { pink: t ? b / t : 0.5, blue: t ? p / t : 0.5 };
    }

    /* ── Confetti ── */

    function launchConfetti(isGirl) {
      if (state.confettiNode) { state.confettiNode.remove(); state.confettiNode = null; }

      const wrap = document.createElement("div");
      wrap.style.cssText = "position:fixed;inset:0;pointer-events:none;z-index:9300;overflow:hidden;";
      document.body.appendChild(wrap);
      state.confettiNode = wrap;

      const palette = isGirl
        ? ["#e2c84d","#f5d742","#fff","#ffeeaa","#ffd700","#fff5cc","#f0c030"]
        : ["#8fc34a","#b0d970","#fff","#d4f0a0","#5daa20","#efffcc","#78b838"];

      for (let i = 0; i < 110; i++) {
        const el    = document.createElement("div");
        const size  = Math.random() * 13 + 6;
        const x     = Math.random() * 100;
        const delay = Math.random() * 1.4;
        const dur   = Math.random() * 2.8 + 2;
        const color = palette[Math.floor(Math.random() * palette.length)];
        const round = Math.random() > 0.45;
        const anim  = Math.random() > 0.5 ? "confetti-fall" : "confetti-sway";

        el.style.cssText = [
          "position:absolute",
          `width:${size}px`,
          `height:${round ? size : size * 0.45}px`,
          `background:${color}`,
          `border-radius:${round ? "50%" : "3px"}`,
          `left:${x}%`,
          "top:-20px",
          `animation:${anim} ${dur}s ease-in ${delay}s forwards`,
        ].join(";");
        wrap.appendChild(el);
      }

      setTimeout(() => {
        if (state.confettiNode === wrap) { wrap.remove(); state.confettiNode = null; }
      }, 5500);
    }

    /* ── Render functions ── */

    function updateTradeHint() {
      if (state.wallet.locked) {
        els.tradeHint.textContent = "בחרת ב" + sideLabel(state.wallet.vote) + " — הבחירה נעולה ✓";
      } else {
        els.tradeHint.textContent = "לחצו פעם אחת כדי לנעול את הבחירה.";
      }
    }

    function renderWallet() {
      const { vote } = state.wallet;
      els.betPinkBtn.classList.toggle("choice-highlight", vote === "pink");
      els.betBlueBtn.classList.toggle("choice-highlight", vote === "blue");
      els.betPinkBtn.classList.toggle("choice-dim", !!vote && vote !== "pink");
      els.betBlueBtn.classList.toggle("choice-dim", !!vote && vote !== "blue");
      updateTradeHint();
    }

    function renderMarket() {
      if (!state.market) return;
      const prices = getPrices(state.market);
      els.girlGauge.style.width  = (prices.pink * 100).toFixed(1) + "%";
      els.boyGauge.style.width   = (prices.blue * 100).toFixed(1) + "%";
      els.girlGaugeLabel.textContent = Math.round(prices.pink * 100) + "%";
      els.boyGaugeLabel.textContent  = Math.round(prices.blue * 100) + "%";
      updateTradeHint();
      renderReveal();
    }

    function renderAdmin() {
      els.adminGate.classList.toggle("hidden", state.isAdmin);
      els.adminControls.classList.toggle("hidden", !state.isAdmin);
    }

    function renderReveal() {
      if (state.revealTimer) { clearTimeout(state.revealTimer); state.revealTimer = null; }

      if (!state.market?.revealed || !state.market?.winner) {
        els.resultBanner.classList.remove("visible", "winner-pink", "winner-blue");
        if (state.confettiNode) { state.confettiNode.remove(); state.confettiNode = null; }
        return;
      }

      const winner = state.market.winner;
      const isGirl = winner === "pink";

      els.resultTitle.textContent = isGirl ? "זו בת!" : "זה בן!";
      els.resultEmoji.textContent = isGirl ? "👧" : "👦";

      if (state.wallet.vote) {
        els.resultSub.textContent = state.wallet.vote === winner ? "ניחשת נכון! 🎉" : "ניחוש שגוי 😅";
      } else {
        els.resultSub.textContent = "";
      }

      els.resultBanner.classList.remove("winner-pink", "winner-blue");
      els.resultBanner.classList.add("visible", isGirl ? "winner-pink" : "winner-blue");

      launchConfetti(isGirl);

      state.revealTimer = setTimeout(() => {
        els.resultBanner.classList.remove("visible", "winner-pink", "winner-blue");
        state.revealTimer = null;
      }, 9000);
    }

    function setBusy(nextBusy) {
      state.isBusy = nextBusy;
      const disabled = nextBusy || !state.market || state.market.revealed || state.wallet.locked;
      els.betPinkBtn.disabled   = disabled;
      els.betBlueBtn.disabled   = disabled;
      els.adminUnlockBtn.disabled = nextBusy;
      els.revealPinkBtn.disabled  = disabled || !state.isAdmin;
      els.revealBlueBtn.disabled  = disabled || !state.isAdmin;
      els.resetMarketBtn.disabled = nextBusy || !state.market || !state.isAdmin;
      els.resetWalletBtn.disabled = nextBusy || !state.isAdmin;
    }

    /* ── Supabase actions ── */

    async function fetchMarket() {
      const { data, error } = await state.supabase
        .from("market").select("*").eq("id", MARKET_ID).single();
      if (error) throw error;
      state.market = data;
      renderMarket();
    }

    async function placeBet(side) {
      if (!state.market || state.market.revealed || state.wallet.locked) return;
      setBusy(true);
      try {
        const { data, error } = await state.supabase.rpc("place_market_bet", {
          p_market_id: MARKET_ID, p_side: side, p_amount: 25
        });
        if (error) throw error;
        state.wallet.vote   = side;
        state.wallet.locked = true;
        state.wallet.history.unshift({ side, at: new Date().toISOString() });
        saveWallet();
        renderWallet();
        state.market = Array.isArray(data) ? data[0] : data;
        renderMarket();
      } catch (err) {
        console.error(err);
        const msg = err?.message || "אירעה שגיאה. בדקו חיבור.";
        els.tradeHint.textContent = msg;
        alert(msg);
      } finally { setBusy(false); }
    }

    async function revealWinner(winner) {
      if (!state.market) return;
      setBusy(true);
      try {
        const { data, error } = await state.supabase
          .from("market")
          .update({ revealed: true, winner, announcement: null, updated_at: new Date().toISOString() })
          .eq("id", MARKET_ID).select().single();
        if (error) throw error;
        state.market = data;
        renderMarket();
      } catch (err) {
        console.error(err);
        const msg = err?.message || "החשיפה נכשלה.";
        els.tradeHint.textContent = msg;
        alert(msg);
      } finally { setBusy(false); }
    }

    async function resetMarket() {
      if (!state.market) return;
      setBusy(true);
      try {
        const { data, error } = await state.supabase
          .from("market")
          .update({ pink_pool: 500, blue_pool: 500, revealed: false, winner: null, announcement: null, updated_at: new Date().toISOString() })
          .eq("id", MARKET_ID).select().single();
        if (error) throw error;
        state.market = data;
        els.tradeHint.textContent = "השוק אופס.";
        renderMarket();
      } catch (err) {
        console.error(err);
        const msg = err?.message || "האיפוס נכשל.";
        els.tradeHint.textContent = msg;
        alert(msg);
      } finally { setBusy(false); }
    }

    function unlockAdmin() {
      const input = window.prompt("הכניסו קוד מנהל");
      if (input === null) return;
      if (input !== ADMIN_PASSCODE) { alert("קוד שגוי."); return; }
      state.isAdmin = true;
      renderAdmin();
      setBusy(state.isBusy);
    }

    /* ── Event bindings ── */

    function bindUI() {
      els.betPinkBtn.addEventListener("click",  () => placeBet("pink"));
      els.betBlueBtn.addEventListener("click",  () => placeBet("blue"));
      els.adminUnlockBtn.addEventListener("click", unlockAdmin);
      els.revealPinkBtn.addEventListener("click",  () => revealWinner("pink"));
      els.revealBlueBtn.addEventListener("click",  () => revealWinner("blue"));
      els.resetMarketBtn.addEventListener("click", resetMarket);
      els.resetWalletBtn.addEventListener("click", () => {
        resetLocalWallet();
        els.tradeHint.textContent = "הבחירה במכשיר הזה אופסה.";
      });
      // Tap to dismiss reveal early
      els.resultBanner.addEventListener("click", () => {
        if (state.revealTimer) { clearTimeout(state.revealTimer); state.revealTimer = null; }
        els.resultBanner.classList.remove("visible", "winner-pink", "winner-blue");
      });
    }

    /* ── Realtime subscription ── */

    async function setupRealtime() {
      state.channel = state.supabase
        .channel("market-live")
        .on("postgres_changes",
          { event: "UPDATE", schema: "public", table: "market", filter: "id=eq." + MARKET_ID },
          (payload) => { state.market = payload.new; renderMarket(); }
        )
        .subscribe((status) => {
          if (status === "SUBSCRIBED") {
            els.connectionStatus.textContent = "חיבור חי ✓";
          } else if (status === "CHANNEL_ERROR" || status === "TIMED_OUT") {
            els.connectionStatus.textContent = "החיבור נחלש";
          }
        });
    }

    /* ── Boot ── */

    async function init() {
      setBusy(true);
      renderWallet();
      renderAdmin();
      bindUI();

      if (!SUPABASE_URL || SUPABASE_URL === "YOUR_SUPABASE_URL" ||
          !SUPABASE_ANON_KEY || SUPABASE_ANON_KEY === "YOUR_SUPABASE_ANON_KEY") {
        els.connectionStatus.textContent = "יש להגדיר מפתחות Supabase";
        els.tradeHint.textContent = "הוסיפו את כתובת Supabase ואת המפתח הציבורי.";
        return;
      }

      try {
        state.supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        await fetchMarket();
        await setupRealtime();
        els.connectionStatus.textContent = "מחובר ✓";
      } catch (err) {
        console.error(err);
        els.connectionStatus.textContent = "החיבור נכשל";
        els.tradeHint.textContent = err.message || "לא ניתן להתחבר.";
      } finally {
        setBusy(false);
      }
    }

    init();
  </script>
</body>
</html>
